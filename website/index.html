<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Brand Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Beauty Brand Expense Tracker</h1>

        <form id="expenseForm">

            <input
                type="date"
                id="date"
                required
            >

            <input
                type="number"
                id="amount"
                placeholder="Amount"
                required
            >

            <input
                type="text"
                id="category"
                placeholder="Category"
                required
            >

            <input
                type="text"
                id="description"
                placeholder="Description"
                required
            >

            <button type="submit">
                Add Expense
            </button>

        </form>

        <h2>Expenses</h2>

        <div id="expenseList"></div>

    </div>

    <script src="app.js"></script>

</body>
</html>
